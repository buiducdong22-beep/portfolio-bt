    function Navbar({ currentPage, setCurrentPage }) {

                    className={`text-left px-5 py-4 rounded-2xl transition-all duration-300 flex items-center gap-4 font-medium relative overflow-hidden ${
                      activeTab === proj.id 
                        ? 'bg-emerald-600 text-white shadow-md' 
                        : 'text-neutral-600 hover:bg-emerald-50 hover:text-emerald-900 border border-transparent hover:border-emerald-100'
                    }`}
                  >
                    <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 transition-colors duration-300 ${activeTab === proj.id ? 'bg-white/20 text-white' : 'bg-neutral-100 text-emerald-700'}`}>
                      {proj.icon}
                    </div>
                    <span className="line-clamp-2 leading-snug">{proj.title}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Content Area */}
            <div className="lg:w-2/3">
              <AnimatePresence mode="wait">
                <motion.div
                  key={activeTab}
                  initial={{ opacity: 0, x: 20 }}
                  animate={{ opacity: 1, x: 0 }}
                  exit={{ opacity: 0, x: -20 }}
                  transition={{ duration: 0.4, type: "spring", bounce: 0.2 }}
                  className="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-neutral-200"
                >
                  <div className="mb-10 border-b border-neutral-100 pb-6">
                    <span className="text-emerald-600 font-bold text-sm tracking-wider uppercase mb-2 block">Bài tập {activeTab}</span>
                    <h2 className="text-2xl md:text-3xl font-bold text-emerald-950 leading-tight">
                      {projects.find(p => p.id === activeTab).title}
                    </h2>
                  </div>
                  {projects.find(p => p.id === activeTab).content}
                </motion.div>
              </AnimatePresence>
            </div>
          </div>
        </motion.div>
      )
    }

    // ----------------------------------------------------
    // CONCLUSION PAGE COMPONENT
    // ----------------------------------------------------
    function ConclusionPage() {
      return (
        <motion.div initial={{opacity:0, y: 20}} animate={{opacity:1, y: 0}} exit={{opacity:0}} className="pt-24 pb-20 px-6 max-w-4xl mx-auto w-full">
          <div className="text-center mb-12">
            <h1 className="text-4xl md:text-5xl font-bold text-emerald-950 mb-6">Tổng Kết Hành Trình</h1>
            <div className="w-24 h-1 bg-emerald-500 mx-auto rounded-full"></div>
          </div>

          <div className="bg-white p-8 md:p-14 rounded-3xl shadow-xl border border-neutral-100 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-400 to-teal-600"></div>
            <Quote className="absolute top-10 left-10 w-24 h-24 text-emerald-50 opacity-50 pointer-events-none" />
            
            <div className="relative z-10">
              <h2 className="text-2xl md:text-3xl font-bold text-emerald-900 text-center mb-12 leading-relaxed italic px-4">
                "Công nghệ số không thay thế tư duy của chúng ta,<br/>nó định hình lại cách chúng ta hiện thực hóa những tư duy đó."
              </h2>

              <div className="space-y-6 text-lg text-neutral-700 leading-relaxed font-medium">
                <p>
                  Nhìn lại toàn bộ hành trình thực hiện dự án Portfolio cá nhân này, tôi tự nhận thấy một bước chuyển dịch lớn trong nhận thức và năng lực hành vi số của bản thân. Trước khi tiếp cận môn học, việc quản lý máy tính hay tương tác với các hệ thống thông minh của tôi chủ yếu dựa trên thói quen tự phát và cảm tính.
                </p>
                <p>
                  Quá trình xây dựng không gian lưu trữ này đã đặt ra cho tôi không ít thách thức lớn: từ việc phải từ bỏ thói quen đặt tên file bừa bãi để thiết lập một cây thư mục khoa học, cho đến việc liên tục thất bại khi viết những prompt ngây thơ ban đầu cho AI. Những rào cản đó buộc tôi phải chủ động nghiên cứu sâu hơn về bản chất của công nghệ: nghiên cứu cách các toán tử tìm kiếm vận hành, hiểu về cơ chế chú ý ngữ cảnh của các mô hình ngôn ngữ lớn, và học cách vận hành dòng công việc nhóm một cách tự động hóa trên môi trường số.
                </p>
                <p>
                  Kinh nghiệm quý báu nhất tôi đúc kết được là <strong className="text-emerald-800">khả năng tư duy hệ thống</strong> và <strong className="text-emerald-800">năng lực làm chủ công nghệ có trách nhiệm</strong>. Là một sinh viên chuyên ngành thiết kế đồ họa, các kỹ năng số nâng cao thu hoạch được từ môn học này – đặc biệt là kỹ thuật Prompt Engineering kiểm soát AI tạo sinh hình ảnh và tư duy quản lý tài nguyên số khoa học – sẽ là bệ phóng cực kỳ vững chắc.
                </p>
                <div className="bg-emerald-50 p-8 rounded-2xl border-l-4 border-emerald-500 mt-10 text-emerald-950 shadow-inner text-xl">
                  Chúng cho phép tôi tăng tốc quy trình phác thảo ý tưởng thị giác, tối ưu hóa thời gian sản xuất và phối hợp làm việc nhóm hiệu quả trong các đồ án chuyên ngành thiết kế phức tạp sau này, sẵn sàng đáp ứng những tiêu chuẩn khắt khe của ngành công nghiệp sáng tạo hiện đại.
                </div>
              </div>
            </div>
          </div>
        </motion.div>
      )
    }

    // ----------------------------------------------------
    // MAIN APP ENTRY
    // ----------------------------------------------------
    function App() {
      const [currentPage, setCurrentPage] = useState('Home');

      return (
        <div className="min-h-screen bg-[#F8FAF9] text-neutral-900 font-sans antialiased flex flex-col">
          <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} />
          <main className="flex-1">
            <AnimatePresence mode="wait">
              {currentPage === 'Home' && <HomePage key="home" />}
              {currentPage === 'Projects' && <ProjectsPage key="projects" />}
              {currentPage === 'Conclusion' && <ConclusionPage key="conclusion" />}
            </AnimatePresence>
          </main>
          
          <footer className="py-8 text-center text-neutral-500 text-sm border-t border-neutral-200 mt-auto bg-white">
            &copy; {new Date().getFullYear()} Digital Portfolio - Trang. Thiết kế Đồ họa.
          </footer>
        </div>
      )
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

    // --- TYPEWRITER HOOK ---
    function useTypewriter(text, speed = 40, startDelay = 500) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);

      useEffect(() => {
        let timeout;
        let interval;

        timeout = setTimeout(() => {
          let i = 0;
          interval = setInterval(() => {
            setDisplayed((prev) => {
              const nextStr = text.slice(0, i + 1);
              i++;
              if (i >= text.length) {
                clearInterval(interval);
                setDone(true);
              }
              return nextStr;
            });
          }, speed);
        }, startDelay);

        return () => {
          clearTimeout(timeout);
          clearInterval(interval);
        };
      }, [text, speed, startDelay]);

      return { displayed, done };
    }

    function CustomCursor() {
      const [mousePosition, setMousePosition] = React.useState({ x: -100, y: -100 });
      const [isHovering, setIsHovering] = React.useState(false);
      
      React.useEffect(() => {
        const updateMousePosition = (e) => {
          setMousePosition({ x: e.clientX, y: e.clientY });
        };
        const handleMouseOver = (e) => {
          if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.closest('button')) {
            setIsHovering(true);
          } else {
            setIsHovering(false);
          }
        };
        window.addEventListener('mousemove', updateMousePosition);
        window.addEventListener('mouseover', handleMouseOver);
        return () => {
          window.removeEventListener('mousemove', updateMousePosition);
          window.removeEventListener('mouseover', handleMouseOver);
        };
      }, []);

      return (
        <React.Fragment>
          <motion.div
            className="fixed top-0 left-0 w-12 h-12 rounded-full border-2 border-accent z-[100] pointer-events-none hidden md:flex items-center justify-center mix-blend-multiply"
            animate={{ 
              x: mousePosition.x - 24, 
              y: mousePosition.y - 24,
              scale: isHovering ? 1.5 : 1,
              backgroundColor: isHovering ? 'rgba(77,109,71,0.1)' : 'transparent'
            }}
            transition={{ type: "spring", stiffness: 150, damping: 20, mass: 0.5 }}
          />
          <div 
            className="fixed top-0 left-0 w-2 h-2 rounded-full bg-primary z-[100] pointer-events-none hidden md:block"
            style={{ transform: `translate(${mousePosition.x - 4}px, ${mousePosition.y - 4}px)` }}
          />
        </React.Fragment>
      );
    }

    function BackgroundVideo() {
      const videoRef = useRef(null);
      const targetTimeRef = useRef(0);
      const currentLerpTimeRef = useRef(0);
      const isSeekingRef = useRef(false);
      const animationFrameId = useRef(null);
      
      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const lerp = (start, end, amount) => (1 - amount) * start + amount * end;

        const renderLoop = () => {
          currentLerpTimeRef.current = lerp(currentLerpTimeRef.current, targetTimeRef.current, 0.035);
          if (!isSeekingRef.current && Math.abs(video.currentTime - currentLerpTimeRef.current) > 0.01) {
            isSeekingRef.current = true;
            video.currentTime = currentLerpTimeRef.current;
          }
          animationFrameId.current = requestAnimationFrame(renderLoop);
        };

        animationFrameId.current = requestAnimationFrame(renderLoop);

        const handleMouseMove = (e) => {
          if (window.innerWidth < 1024) return;
          const rect = document.getElementById('home').getBoundingClientRect();
          if (e.clientY > rect.bottom) return;

          const percentage = e.clientX / window.innerWidth;
          if (video.duration) {
            let newTarget = percentage * video.duration;
            targetTimeRef.current = Math.max(0, Math.min(newTarget, video.duration));
          }
        };

        const handleSeeked = () => {
          isSeekingRef.current = false;
        };

        const checkMobile = () => {
          if (window.innerWidth < 1024) {
            video.autoplay = true;
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('resize', checkMobile);
        video.addEventListener('seeked', handleSeeked);
        
        checkMobile();

        return () => {
          cancelAnimationFrame(animationFrameId.current);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', checkMobile);
          video.removeEventListener('seeked', handleSeeked);
        };
      }, []);

      return (
        <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none w-full h-full bg-neutral-50 lg:bg-transparent">
          {/* A stronger gradient overlay to ensure text has high contrast */}
          <div className="absolute inset-0 bg-gradient-to-r from-white/95 via-white/70 to-white/10 z-10"></div>

            muted 
            playsInline 
            preload="auto"
            className="w-full h-full object-cover object-right lg:object-right-bottom"
          />
        </div>
      );
    }

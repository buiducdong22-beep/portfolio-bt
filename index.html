    // --- TYPEWRITER HOOK ---
    function useTypewriter(text, speed = 40, startDelay = 500) {
      const [displayed, setDisplayed] = useState('');
      const [done, setDone] = useState(false);

      useEffect(() => {
        let timeout;
        let interval;

        timeout = setTimeout(() => {
          let i = 0;
          interval = setInterval(() => {
            setDisplayed((prev) => {
              const nextStr = text.slice(0, i + 1);
              i++;
              if (i >= text.length) {
                clearInterval(interval);
                setDone(true);
              }
              return nextStr;
            });
          }, speed);
        }, startDelay);

        return () => {
          clearTimeout(timeout);
          clearInterval(interval);
        };
      }, [text, speed, startDelay]);

      return { displayed, done };
    }

    function BackgroundVideo() {
      const videoRef = useRef(null);
      const targetTimeRef = useRef(0);
      const currentLerpTimeRef = useRef(0);
      const isSeekingRef = useRef(false);
      const animationFrameId = useRef(null);
      
      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const lerp = (start, end, amount) => (1 - amount) * start + amount * end;

        const renderLoop = () => {
          currentLerpTimeRef.current = lerp(currentLerpTimeRef.current, targetTimeRef.current, 0.035);
          if (!isSeekingRef.current && Math.abs(video.currentTime - currentLerpTimeRef.current) > 0.01) {
            isSeekingRef.current = true;
            video.currentTime = currentLerpTimeRef.current;
          }
          animationFrameId.current = requestAnimationFrame(renderLoop);
        };

        animationFrameId.current = requestAnimationFrame(renderLoop);

        const handleMouseMove = (e) => {
          if (window.innerWidth < 1024) return;
          const rect = document.getElementById('home').getBoundingClientRect();
          // Only scrub if mouse is within the hero section to prevent weird behavior down the page
          if (e.clientY > rect.bottom) return;

          const percentage = e.clientX / window.innerWidth;
          if (video.duration) {
            let newTarget = percentage * video.duration;
            targetTimeRef.current = Math.max(0, Math.min(newTarget, video.duration));
          }
        };

        const handleSeeked = () => {
          isSeekingRef.current = false;
        };

        const checkMobile = () => {
          if (window.innerWidth < 1024) {
            video.autoplay = true;
            video.play().catch(() => {});
          } else {
            video.pause();
          }
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('resize', checkMobile);
        video.addEventListener('seeked', handleSeeked);
        
        checkMobile();

        return () => {
          cancelAnimationFrame(animationFrameId.current);
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', checkMobile);
          video.removeEventListener('seeked', handleSeeked);
        };
      }, []);

      return (
        <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none w-full h-full bg-neutral-50 lg:bg-transparent">
          <div className="absolute inset-0 bg-white/40 z-10"></div>
          <video

            muted 
            playsInline 
            preload="auto"
            className="w-full h-full object-cover object-right lg:object-right-bottom"
          />
        </div>
      );
    }
